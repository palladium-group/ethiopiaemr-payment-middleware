name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/ethiopiaemr-payment-middleware
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  restart-k8s-deployment:
    runs-on: ubuntu-latest
    needs: docker
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
    steps:
      - name: Validate SSH secrets
        shell: bash
        run: |
          test -n "$SSH_HOST" || (echo "Missing secret: SSH_HOST" && exit 1)
          test -n "$SSH_USER" || (echo "Missing secret: SSH_USER" && exit 1)
          test -n "$SSH_PASSWORD" || (echo "Missing secret: SSH_PASSWORD" && exit 1)
          test -n "$SSH_PORT" || (echo "Missing secret: SSH_PORT" && exit 1)

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Restart Kubernetes deployment over SSH
        shell: bash
        run: |
          SSH_PORT_VALUE="$SSH_PORT"
          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=keyboard-interactive,password \
            -o PubkeyAuthentication=no \
            -o KbdInteractiveAuthentication=yes \
            -o PasswordAuthentication=yes \
            -p "$SSH_PORT_VALUE" \
            "$SSH_USER@$SSH_HOST" \
            "KUBECONFIG=\$HOME/.kube/config kubectl rollout restart deployment/payment-middleware -n payment-middleware"
